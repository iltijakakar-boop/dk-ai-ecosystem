[mypy]
explicit_package_bases = True
namespace_packages = True
ignore_missing_imports = True
allow_untyped_defs = True
allow_untyped_calls = True
no_implicit_optional = False
disallow_untyped_decorators = False
warn_return_any = False
warn_unused_ignores = False
no_implicit_reexport = False
strict = False
disable_error_code = union-attr, call-overload, arg-type, index, return-value, assignment, operator, str-bytes-safe, attr-defined

[mypy-jose.*]
ignore_missing_imports = True

[mypy-agents.*]
ignore_missing_imports = True

[mypy-chromadb.*]
ignore_missing_imports = True

[mypy-faiss.*]
ignore_missing_imports = True

[mypy-redis.*]
ignore_missing_imports = True

[mypy-alembic.*]
ignore_missing_imports = True

[mypy-passlib.*]
ignore_missing_imports = True

[mypy-docx.*]
ignore_missing_imports = True

[mypy-PyPDF2.*]
ignore_missing_imports = True

[mypy-openpyxl.*]
ignore_missing_imports = True

[mypy-bs4.*]
ignore_missing_imports = True

[mypy-markdown.*]
ignore_missing_imports = True

[mypy-numpy.*]
ignore_missing_imports = True

[mypy-app.*]
ignore_missing_imports = True

